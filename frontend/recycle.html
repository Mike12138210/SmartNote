<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能笔记 - 回收站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .container {
            max-width: 1000px;
            margin: 20px auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
            vertical-align: middle;
        }
        th {
            background: #f2f2f2;
        }
        /* 操作列按钮上下排列 */
        td:last-child {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }
        .btn-sm {
            display: block;
            width: 100%;
            margin: 0;
            padding: 6px 8px;
            font-size: 0.9em;
            box-sizing: border-box;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
        }
        .empty {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>回收站</h2>
    <div id="recycleList">
        <div class="empty">加载中...</div>
    </div>
    <a href="index.html" class="back-link">← 返回主页</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script type="module" src="js/api.js"></script>
<script type="module" src="js/recycle.js"></script>
</body>
</html>
